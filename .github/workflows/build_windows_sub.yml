# Reusable workflow for all Windows builds
name: Fuse Utils For Windows
run-name: Build Fuse Utils for Windows / ${{ github.actor }} /

on:
  workflow_call:
    inputs:
      name:
        type: string
        required: true
      dependencies:
        type: string
        required: false
        default: ""
      configure_params:
        type: string
        required: false
        default: ""
      libspectrum_key:
        type: string
        required: false
        default: "fuse-utils"
      upload_artifacts:
        type: boolean
        required: false
        default: false
      ref:
        type: string
        required: false
        default: ""

jobs:
  build:
    name: Build Utils
    runs-on: windows-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash.exe --login --norc -eo pipefail -o igncr '{0}'
    env:
      CYGWIN_NOWINPATH: 1
      
      # Custom build libraries
      CPPFLAGS: "-I/usr/local/i686-w64-mingw32/include"
      LDFLAGS: "-L/usr/local/i686-w64-mingw32/lib"
      PKG_CONFIG_LIBDIR: "/usr/local/i686-w64-mingw32/lib/pkgconfig:/usr/i686-w64-mingw32/sys-root/mingw/lib/pkgconfig"
    steps:
      - name: (1) Prepare environment
        run: |
          cd ${GITHUB_WORKSPACE}

          echo "Adjust autocrlf in git.."
          git config --global core.autocrlf input

          echo -n "Current directory: "
          pwd
          ls -la
        shell: bash

      - name: (2) Check out repository code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: (2b) Resolve Cygwin package cache path
        id: cygwin-cache-path
        run: |
          if (Test-Path -LiteralPath 'D:\') {
            $workVol = 'D:'
          } else {
            $workVol = 'C:'
          }

          echo "work-vol=$workVol" >> $env:GITHUB_OUTPUT
          echo "package-cache=$workVol\cygwin-packages" >> $env:GITHUB_OUTPUT
        shell: powershell

      - name: (3) Restore Cygwin packages
        id: cygwin-cache-load
        uses: actions/cache/restore@v5
        with:
          path: |
            ${{ steps.cygwin-cache-path.outputs.package-cache }}
          key: cygwin-packages-libspectrum-1

      - name: (4) Install Cygwin (32 bit) with libs
        uses: cygwin/cygwin-install-action@711d29f3da23c9f4a1798e369a6f01198c13b11a # v6
        with:
          work-vol: ${{ steps.cygwin-cache-path.outputs.work-vol }}
          platform: x86
          packages: |
            autoconf \
            automake \
            bison \
            dos2unix \
            flex \
            gcc-core \
            gcc-g++ \
            gettext-devel \
            libtool \
            make \
            zip \
            mingw64-i686-bzip2 \
            mingw64-i686-gcc-core \
            mingw64-i686-gcc-g++ \
            mingw64-i686-libgcrypt \
            mingw64-i686-libgpg-error \
            mingw64-i686-libjpeg-turbo \
            mingw64-i686-libpng \
            mingw64-i686-win-iconv \
            mingw64-i686-winpthread \
            mingw64-i686-zlib \
            mingw64-i686-audiofile \
            pkg-config \
            ${{ inputs.dependencies }}

      - name: (5) Download libspectrum artefact
        uses: actions/download-artifact@v8
        with:
          name: libspectrum-installed-windows-${{ inputs.libspectrum_key }}
          path: libspectrum

      - name: (6) Install libspectrum from artefact
        run: |
          cd ${GITHUB_WORKSPACE}
          # Extract (-x) files into /usr/local (cannot work with root /)
          mkdir /usr/local/i686-w64-mingw32 || true
          tar --directory /usr/local/i686-w64-mingw32 -xvf libspectrum/libspectrum-installed-windows.tar
          echo "Done"

      - name: (7) Autogen.sh
        run: |
          cd ${GITHUB_WORKSPACE}
          echo "Running autogen.sh .."
          ./autogen.sh

      - name: (8) Configure for Windows
        run: |
          cd ${GITHUB_WORKSPACE}
          echo "Running configure .."
          ./configure \
          --build=i686-pc-cygwin \
          --host=i686-w64-mingw32 \
          --prefix=/usr/local/i686-w64-mingw32 \
          --disable-static \
          ${{ inputs.configure_params }} \
          |& tee ./configure.out

      - name: (9) Verify output from configure
        # Most of the tested strings are common for all Windows builds
        run: |          
          cd ${GITHUB_WORKSPACE}
          
          .github/scripts/in_config.sh "The Fuse utils are ready to be compiled"
          .github/scripts/in_config.sh "zlib support: yes"
          .github/scripts/in_config.sh "libjpeg support: yes"
          .github/scripts/in_config.sh "libpng support: yes"
          .github/scripts/in_config.sh "libgcrypt support: yes"
          .github/scripts/in_config.sh "libaudiofile support: yes"
          .github/scripts/in_config.sh "libspectrum's internal GLib replacement: yes"
          

      - name: (10) Make
        run: |
          cd ${GITHUB_WORKSPACE}
          
          echo "Running make .."
          make

      - name: (11) Install
        run: |
          cd ${GITHUB_WORKSPACE}
          
          echo "Running make dist-win32-dir .."
          make install dist-win32-dir

      - name: (11b) Verify DLL dependencies in distribution
        run: |
          cd ${GITHUB_WORKSPACE}

          dist_dir=$(ls -d *-win32 2>/dev/null | head -n 1)
          test -n "$dist_dir" && test -d "$dist_dir" || { echo "ERROR: win32 distribution directory not found"; exit 1; }

          echo "Checking DLL dependencies in ${dist_dir} .."
          missing=0
          while read -r file; do
            for dll in $(objdump -p "$file" 2>/dev/null | grep 'DLL Name' | sed 's/.*DLL Name: //'); do
              test -f "$dist_dir/$dll" && continue
              found=0
              for searchdir in "$dist_dir" \
                              /usr/local/i686-w64-mingw32/bin \
                              /usr/i686-w64-mingw32/sys-root/mingw/bin \
                              /usr/i686-w64-mingw32/sys-root/mingw/system32 \
                              /usr/local/i686-w64-mingw32/system32 \
                              /usr/i686-pc-mingw32/sys-root/mingw/bin \
                              /usr/i686-pc-mingw32/sys-root/mingw/system32; do
                if test -f "$searchdir/$dll"; then
                  found=1
                  break
                fi
              done
              if test $found -eq 0; then
                echo "Missing dependency for ${file}: ${dll}"
                missing=1
              fi
            done
          done < <(find "$dist_dir" -type f \( -name '*.exe' -o -name '*.dll' \) -print)
          test $missing -eq 0

      - name: (12) Create distribution zip
        if: ${{ inputs.upload_artifacts }}
        run: |
          cd ${GITHUB_WORKSPACE}

          echo "Running make dist-win32-zip .."
          make dist-win32-zip

          echo "Distribution files:"
          ls -la *.zip *.sha1 2>/dev/null || echo "No zip files found"

      - name: (13) Upload artifacts
        if: ${{ inputs.upload_artifacts }}
        uses: actions/upload-artifact@v7
        with:
          name: fuse-utils-windows-${{ inputs.name }}
          path: |
            *.zip
            *.sha1

      - name: (14) Finish
        run: |
          echo "🍏 Finishing with status ${{ job.status }}."
